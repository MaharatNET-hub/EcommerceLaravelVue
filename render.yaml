databases: []

# Free-tier trial setup: a single Docker web service, no paid instances,
# no persistent disks. Uses SQLite instead of MySQL because Render's paid
# plans are required for any private service (so a self-hosted MySQL
# service isn't possible on the free tier).
#
# IMPORTANT: with no persistent disk, all data (products, orders, uploaded
# images) resets on every deploy AND whenever the free instance spins down
# from inactivity and wakes back up. The demo seeder re-populates the shop
# automatically on each start, so the site never appears empty — but real
# orders/edits made between resets will be lost. Use this only for trying
# things out; switch to the paid render.yaml setup for a real live store.
services:
  - type: web
    name: shop-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: "المتجر"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_LOCALE
        value: ar
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: public
      - key: ADMIN_EMAIL
        value: support@maharatnet.com
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: APP_URL
        sync: false
